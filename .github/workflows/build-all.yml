name: Build CatBoost All Platforms

on:
  workflow_dispatch:
    inputs:
      catboost_version:
        description: 'CatBoost version tag (e.g. 1.2.8)'
        required: true
        type: string
        default: '1.2.8'
      artifact_retention_days:
        description: 'Artifact retention days'
        required: false
        type: number
        default: 90
      platforms:
        description: 'Platforms to build (comma-separated: linux,macos,windows or all)'
        required: false
        type: string
        default: 'all'

jobs:
  # ============================================================
  # Linux x86_64 Build
  # ============================================================
  build-linux-x86_64:
    if: contains(inputs.platforms, 'linux') || inputs.platforms == 'all'
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CMAKE_BUILD_CACHE_DIR: cmake_build_cache
    steps:
      - name: Remove unneeded packages and tools cache
        run: |
          sudo apt-get remove -y '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-chrome-stable firefox mono-devel libgl1-mesa-dri \
            google-cloud-sdk google-cloud-cli '^gfortran-.*' java-common \
            '^r-.*' '^lib.*-dev' --fix-missing || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 48500
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout CatBoost
        uses: actions/checkout@v4
        with:
          repository: catboost/catboost
          ref: v${{ inputs.catboost_version }}
          path: catboost
          fetch-depth: 0

      - name: Create build cache dir
        run: mkdir -p ${{ github.workspace }}/cmake_build_cache

      - name: Docker login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build in container
        run: |
          mkdir -p ${{ github.workspace }}/catboost_build_home
          docker run --rm --name=catboost_build \
            --user $(id -u):$(id -g) \
            -v /etc/passwd:/etc/passwd \
            -v ${{ github.workspace }}/catboost_build_home:$HOME \
            -v ${{ github.workspace }}/catboost:/src/catboost \
            -v ${{ github.workspace }}/cmake_build_cache:/cmake_build_cache \
            -e CMAKE_BUILD_CACHE_DIR=/cmake_build_cache/ \
            ghcr.io/catboost/manylinux2014_x86_64_and_cross_arm64_for_catboost_ci:latest \
            bash -c ". /work/setup_env/build_x86_64.sh && \
                     export PATH=\$HOME/.local/bin:\$PATH && \
                     ln -sf /opt/cmake_build_env_root \$HOME/ && \
                     rsync -rptl /opt/.conan2 \$HOME/ && \
                     cd /src/catboost && \
                     python ./ci/fixup_python_version.py && \
                     ./ci/build_all.py --build-test-tools --target-platforms linux-x86_64"

      # Upload CLI
      - name: 'Upload: CLI (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-cli-linux-x86_64
          path: catboost/build_native_root/have_cuda/linux-x86_64/catboost/app/catboost
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboostmodel library (推理)
      - name: 'Upload: catboostmodel library (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-model-interface-linux-x86_64
          path: catboost/build_native_root/have_cuda/linux-x86_64/catboost/libs/model_interface/libcatboostmodel.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboost train_interface library (训练)
      - name: 'Upload: libcatboost train library (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-train-interface-linux-x86_64
          path: catboost/build_native_root/have_cuda/linux-x86_64/catboost/libs/train_interface/libcatboost.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Python wheels
      - name: 'Upload: Python wheels (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-wheels-linux-x86_64
          path: catboost/catboost/python-package/dist/*.whl
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Python source dist
      - name: 'Upload: Python source package'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-package-src
          path: catboost/catboost/python-package/dist/*.tar.gz
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload R package
      - name: 'Upload: R package (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-R-package-linux-x86_64
          path: catboost/catboost/R-package/catboost-R-linux-x86_64.tgz
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Spark/JVM artifacts
      - name: 'Upload: catboost4j-spark sources'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-spark-impl-sources
          path: catboost/catboost/spark/catboost4j-spark/core/target/catboost4j-spark-impl-sources.jar
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: 'Upload: catboost4j-spark resources (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-spark-resources-linux-x86_64
          path: catboost/catboost/spark/catboost4j-spark/core/src/main/resources/linux*
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: 'Upload: catboost4j-prediction resources (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-prediction-resources-linux-x86_64
          path: catboost/catboost/jvm-packages/catboost4j-prediction/src/main/resources/*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload test tools
      - name: 'Upload: test tools (linux-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-test-tools-linux-x86_64
          path: |
            catboost/build_native_root/no_cuda/linux-x86_64/catboost/tools/limited_precision_dsv_diff/limited_precision_dsv_diff
            catboost/build_native_root/no_cuda/linux-x86_64/catboost/tools/limited_precision_json_diff/limited_precision_json_diff
            catboost/build_native_root/no_cuda/linux-x86_64/catboost/tools/model_comparator/model_comparator
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload widget (only from linux-x86_64)
      - name: 'Upload: Python package widget'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-widget
          path: catboost/catboost/python-package/build/widget
          retention-days: ${{ inputs.artifact_retention_days }}

  # ============================================================
  # Linux aarch64 Build (cross-compiled)
  # ============================================================
  build-linux-aarch64:
    if: contains(inputs.platforms, 'linux') || inputs.platforms == 'all'
    name: Build Linux aarch64
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CMAKE_BUILD_CACHE_DIR: cmake_build_cache
    steps:
      - name: Remove unneeded packages and tools cache
        run: |
          sudo apt-get remove -y '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-chrome-stable firefox mono-devel libgl1-mesa-dri \
            google-cloud-sdk google-cloud-cli '^gfortran-.*' java-common \
            '^r-.*' '^lib.*-dev' --fix-missing || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 48500
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout CatBoost
        uses: actions/checkout@v4
        with:
          repository: catboost/catboost
          ref: v${{ inputs.catboost_version }}
          path: catboost
          fetch-depth: 0

      - name: Create build cache dir
        run: mkdir -p ${{ github.workspace }}/cmake_build_cache

      - name: Docker login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build in container
        run: |
          mkdir -p ${{ github.workspace }}/catboost_build_home
          docker run --rm --name=catboost_build \
            --user $(id -u):$(id -g) \
            -v /etc/passwd:/etc/passwd \
            -v ${{ github.workspace }}/catboost_build_home:$HOME \
            -v ${{ github.workspace }}/catboost:/src/catboost \
            -v ${{ github.workspace }}/cmake_build_cache:/cmake_build_cache \
            -e CMAKE_BUILD_CACHE_DIR=/cmake_build_cache/ \
            ghcr.io/catboost/manylinux2014_x86_64_and_cross_arm64_for_catboost_ci:latest \
            bash -c ". /work/setup_env/build_x86_64.sh && \
                     export PATH=\$HOME/.local/bin:\$PATH && \
                     ln -sf /opt/cmake_build_env_root \$HOME/ && \
                     rsync -rptl /opt/.conan2 \$HOME/ && \
                     cd /src/catboost && \
                     python ./ci/fixup_python_version.py && \
                     ./ci/build_all.py --build-test-tools --target-platforms linux-aarch64"

      # Upload CLI
      - name: 'Upload: CLI (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-cli-linux-aarch64
          path: catboost/build_native_root/have_cuda/linux-aarch64/catboost/app/catboost
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboostmodel library (推理)
      - name: 'Upload: catboostmodel library (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-model-interface-linux-aarch64
          path: catboost/build_native_root/have_cuda/linux-aarch64/catboost/libs/model_interface/libcatboostmodel.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboost train_interface library (训练)
      - name: 'Upload: libcatboost train library (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-train-interface-linux-aarch64
          path: catboost/build_native_root/have_cuda/linux-aarch64/catboost/libs/train_interface/libcatboost.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Python wheels
      - name: 'Upload: Python wheels (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-wheels-linux-aarch64
          path: catboost/catboost/python-package/dist/*.whl
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload R package
      - name: 'Upload: R package (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-R-package-linux-aarch64
          path: catboost/catboost/R-package/catboost-R-linux-aarch64.tgz
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Spark/JVM
      - name: 'Upload: catboost4j-prediction resources (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-prediction-resources-linux-aarch64
          path: catboost/catboost/jvm-packages/catboost4j-prediction/src/main/resources/*
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: 'Upload: catboost4j-spark resources (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-spark-resources-linux-aarch64
          path: catboost/catboost/spark/catboost4j-spark/core/src/main/resources/linux*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload test tools
      - name: 'Upload: test tools (linux-aarch64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-test-tools-linux-aarch64
          path: |
            catboost/build_native_root/no_cuda/linux-aarch64/catboost/tools/limited_precision_dsv_diff/limited_precision_dsv_diff
            catboost/build_native_root/no_cuda/linux-aarch64/catboost/tools/limited_precision_json_diff/limited_precision_json_diff
            catboost/build_native_root/no_cuda/linux-aarch64/catboost/tools/model_comparator/model_comparator
          retention-days: ${{ inputs.artifact_retention_days }}

  # ============================================================
  # macOS: Prepare ARM64 Python environments (前置步骤)
  # ============================================================
  prepare-macos-arm64-python:
    if: contains(inputs.platforms, 'macos') || inputs.platforms == 'all'
    name: Prepare macOS ARM64 Python
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check cache
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          enableCrossOsArchive: true
          path: python_versions_macos_arm64.zip
          key: python_versions_macos_arm64-v1
          lookup-only: true

      - name: Install pyenv and build Python versions
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew install pyenv

          pyenv install 3.8.18
          cd $HOME/.pyenv/versions/ && ln -s 3.8.18 ./3.8
          pyenv install 3.9.19
          cd $HOME/.pyenv/versions/ && ln -s 3.9.19 ./3.9
          pyenv install 3.10.14
          cd $HOME/.pyenv/versions/ && ln -s 3.10.14 ./3.10
          pyenv install 3.11.9
          cd $HOME/.pyenv/versions/ && ln -s 3.11.9 ./3.11
          pyenv install 3.12.3
          cd $HOME/.pyenv/versions/ && ln -s 3.12.3 ./3.12
          pyenv install 3.13.1
          cd $HOME/.pyenv/versions/ && ln -s 3.13.1 ./3.13

          export PYENV_ROOT="$HOME/.pyenv"
          command -v pyenv >/dev/null || export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"

          for PY_VER in 3.8 3.9 3.10 3.11 3.12 3.13
          do
              pyenv shell $PY_VER
              python -m pip install -U pip numpy
          done

          cd $HOME/.pyenv/versions/ && zip -r -y ${{ github.workspace }}/python_versions_macos_arm64.zip *

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          enableCrossOsArchive: true
          path: python_versions_macos_arm64.zip
          key: python_versions_macos_arm64-v1

  # ============================================================
  # macOS universal2 Build
  # ============================================================
  build-macos:
    if: contains(inputs.platforms, 'macos') || inputs.platforms == 'all'
    name: Build macOS universal2
    needs: [prepare-macos-arm64-python]
    runs-on: macos-13
    timeout-minutes: 360
    steps:
      - name: Setup Python versions
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13

      - name: Restore ARM64 Python from cache
        uses: actions/cache/restore@v4
        with:
          enableCrossOsArchive: true
          fail-on-cache-miss: true
          path: python_versions_macos_arm64.zip
          key: python_versions_macos_arm64-v1

      - name: Checkout CatBoost
        uses: actions/checkout@v4
        with:
          repository: catboost/catboost
          ref: v${{ inputs.catboost_version }}
          path: catboost
          fetch-depth: 0

      - name: Env setup
        run: |
          python3 -m pip install -U conan==2.4.1 setuptools wheel jupyterlab==3.0.6 build

          brew update
          brew install ninja

          npm install --global rimraf

          export CMAKE_BUILD_ENV_ROOT=${{ github.workspace }}/cmake_build_env_root

          mkdir -p $CMAKE_BUILD_ENV_ROOT/darwin-x86_64

          # JDK x86_64
          cd $CMAKE_BUILD_ENV_ROOT/darwin-x86_64
          mkdir -p Library/Java/JavaVirtualMachines
          cd Library/Java/JavaVirtualMachines
          ln -s /Library/Java/JavaVirtualMachines/Temurin-Hotspot-8.jdk ./jdk-8 || true

          # Python x86_64
          cd $CMAKE_BUILD_ENV_ROOT/darwin-x86_64
          mkdir -p Python
          cd Python
          for PY_VER in 3.8 3.9 3.10 3.11 3.12 3.13; do
            ln -sf $RUNNER_TOOL_CACHE/Python/$PY_VER.*/x64 ./$PY_VER || true
          done

          for PY_VER in 3.8 3.9 3.10 3.11 3.12 3.13; do
            if [ -d "$CMAKE_BUILD_ENV_ROOT/darwin-x86_64/Python/$PY_VER" ]; then
              $CMAKE_BUILD_ENV_ROOT/darwin-x86_64/Python/$PY_VER/bin/python -m pip install --upgrade pip setuptools wheel numpy cython==3.0.12
            fi
          done

          # ARM64 setup
          mkdir -p $CMAKE_BUILD_ENV_ROOT/darwin-arm64

          # JDK arm64
          cd $CMAKE_BUILD_ENV_ROOT/darwin-arm64
          mkdir -p Library/Java/JavaVirtualMachines
          cd Library/Java/JavaVirtualMachines
          wget -q https://cdn.azul.com/zulu/bin/zulu8.78.0.19-ca-jdk8.0.412-macosx_aarch64.tar.gz || true
          if [ -f zulu8.78.0.19-ca-jdk8.0.412-macosx_aarch64.tar.gz ]; then
            tar xzf zulu8.78.0.19-ca-jdk8.0.412-macosx_aarch64.tar.gz
            ln -sf ./zulu8.78.0.19-ca-jdk8.0.412-macosx_aarch64/zulu-8.jdk ./jdk-8
          fi

          # Python arm64 (from cache)
          cd $CMAKE_BUILD_ENV_ROOT/darwin-arm64
          mkdir -p Python
          cd Python
          unzip ${{ github.workspace }}/python_versions_macos_arm64

      - name: Build
        run: |
          export CMAKE_BUILD_ENV_ROOT=${{ github.workspace }}/cmake_build_env_root
          export CMAKE_BUILD_CACHE_DIR=${{ github.workspace }}/cmake_build_cache
          mkdir -p $CMAKE_BUILD_CACHE_DIR
          cd catboost
          python ./ci/fixup_python_version.py
          python ./ci/build_all.py --build-test-tools --target-platforms darwin-universal2

      # Upload CLI
      - name: 'Upload: CLI (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-cli-darwin-universal2
          path: catboost/build_native_root/no_cuda/darwin-universal2/catboost/app/catboost
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboostmodel library (推理)
      - name: 'Upload: catboostmodel library (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-model-interface-darwin-universal2
          path: catboost/build_native_root/no_cuda/darwin-universal2/catboost/libs/model_interface/libcatboostmodel.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboost train_interface library (训练)
      - name: 'Upload: libcatboost train library (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-train-interface-darwin-universal2
          path: catboost/build_native_root/no_cuda/darwin-universal2/catboost/libs/train_interface/libcatboost.*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Python wheels
      - name: 'Upload: Python wheels (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-wheels-darwin-universal2
          path: catboost/catboost/python-package/dist/*.whl
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload R package
      - name: 'Upload: R package (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-R-package-darwin-universal2
          path: catboost/catboost/R-package/catboost-R-darwin-universal2.tgz
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Spark/JVM
      - name: 'Upload: catboost4j-prediction resources (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-prediction-resources-darwin-universal2
          path: catboost/catboost/jvm-packages/catboost4j-prediction/src/main/resources/*
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: 'Upload: catboost4j-spark resources (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-spark-resources-darwin-universal2
          path: catboost/catboost/spark/catboost4j-spark/core/src/main/resources/darwin*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload test tools
      - name: 'Upload: test tools (darwin-universal2)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-test-tools-darwin-universal2
          path: |
            catboost/build_native_root/no_cuda/darwin-universal2/catboost/tools/limited_precision_dsv_diff/limited_precision_dsv_diff
            catboost/build_native_root/no_cuda/darwin-universal2/catboost/tools/limited_precision_json_diff/limited_precision_json_diff
            catboost/build_native_root/no_cuda/darwin-universal2/catboost/tools/model_comparator/model_comparator
          retention-days: ${{ inputs.artifact_retention_days }}

  # ============================================================
  # Windows x86_64 Build
  # ============================================================
  build-windows:
    if: contains(inputs.platforms, 'windows') || inputs.platforms == 'all'
    name: Build Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Setup Python versions
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.15
        id: cuda-toolkit
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc","cudart","thrust"]'

      - name: Checkout CatBoost
        uses: actions/checkout@v4
        with:
          repository: catboost/catboost
          ref: v${{ inputs.catboost_version }}
          path: catboost
          fetch-depth: 0

      - name: Env setup
        shell: pwsh
        run: |
          python -m pip install -U conan==2.4.1 setuptools wheel jupyterlab==3.0.6 build

          choco install ninja

          npm install --global rimraf

          $CMAKE_BUILD_ENV_ROOT = "${{ github.workspace }}\cmake_build_env_root"

          New-Item "$CMAKE_BUILD_ENV_ROOT\windows-x86_64" -ItemType Directory -Force

          # JDK
          Set-Location -Path "$CMAKE_BUILD_ENV_ROOT\windows-x86_64"
          New-Item -Path .\jdk-8 -ItemType SymbolicLink -Value $Env:JAVA_HOME_8_X64

          # Python
          Set-Location -Path "$CMAKE_BUILD_ENV_ROOT\windows-x86_64"
          New-Item -Path Python -ItemType Directory -Force
          Set-Location -Path .\Python

          foreach($PY_VER in '3.8','3.9','3.10','3.11','3.12','3.13') {
            $py_path = Get-ChildItem "$Env:RUNNER_TOOL_CACHE\Python\$PY_VER.*\x64" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($py_path) {
              New-Item -Path ".\$PY_VER" -ItemType SymbolicLink -Value $py_path.FullName -Force
              & "$CMAKE_BUILD_ENV_ROOT\windows-x86_64\Python\$PY_VER\python.exe" -m pip install --upgrade pip setuptools wheel numpy cython==3.0.12
            }
          }

          # CUDA
          Set-Location -Path "$CMAKE_BUILD_ENV_ROOT\windows-x86_64"
          New-Item -Path CUDA -ItemType Directory -Force
          New-Item -Path .\CUDA\v11.8 -ItemType SymbolicLink -Value "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"

      - name: Build
        shell: pwsh
        run: |
          $Env:CMAKE_BUILD_ENV_ROOT = Join-Path ${{ github.workspace }} cmake_build_env_root
          $Env:CMAKE_BUILD_CACHE_DIR = Join-Path ${{ github.workspace }} cmake_build_cache
          New-Item -Path $Env:CMAKE_BUILD_CACHE_DIR -ItemType Directory -Force
          Set-Location -Path catboost
          python ./ci/fixup_python_version.py
          python ./ci/build_all.py --build-test-tools --target-platforms windows-x86_64

      # Upload CLI
      - name: 'Upload: CLI (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-cli-windows-x86_64
          path: catboost/build_native_root/have_cuda/windows-x86_64/catboost/app/catboost.exe
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboostmodel library (推理)
      - name: 'Upload: catboostmodel library (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-model-interface-windows-x86_64
          path: |
            catboost/build_native_root/have_cuda/windows-x86_64/catboost/libs/model_interface/catboostmodel.dll
            catboost/build_native_root/have_cuda/windows-x86_64/catboost/libs/model_interface/catboostmodel.lib
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload catboost train_interface library (训练)
      - name: 'Upload: catboost train library (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-train-interface-windows-x86_64
          path: |
            catboost/build_native_root/have_cuda/windows-x86_64/catboost/libs/train_interface/catboost.dll
            catboost/build_native_root/have_cuda/windows-x86_64/catboost/libs/train_interface/catboost.lib
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Python wheels
      - name: 'Upload: Python wheels (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-python-wheels-windows-x86_64
          path: catboost/catboost/python-package/dist/*.whl
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload R package
      - name: 'Upload: R package (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-R-package-windows-x86_64
          path: catboost/catboost/R-package/catboost-R-windows-x86_64.tgz
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload Spark/JVM
      - name: 'Upload: catboost4j-prediction resources (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-prediction-resources-windows-x86_64
          path: catboost/catboost/jvm-packages/catboost4j-prediction/src/main/resources/*
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: 'Upload: catboost4j-spark resources (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost4j-spark-resources-windows-x86_64
          path: catboost/catboost/spark/catboost4j-spark/core/src/main/resources/win*
          retention-days: ${{ inputs.artifact_retention_days }}

      # Upload test tools
      - name: 'Upload: test tools (windows-x86_64)'
        uses: actions/upload-artifact@v4
        with:
          name: catboost-test-tools-windows-x86_64
          path: |
            catboost/build_native_root/no_cuda/windows-x86_64/catboost/tools/limited_precision_dsv_diff/limited_precision_dsv_diff.exe
            catboost/build_native_root/no_cuda/windows-x86_64/catboost/tools/limited_precision_json_diff/limited_precision_json_diff.exe
            catboost/build_native_root/no_cuda/windows-x86_64/catboost/tools/model_comparator/model_comparator.exe
          retention-days: ${{ inputs.artifact_retention_days }}

  # ============================================================
  # Create GitHub Release (optional, after all builds complete)
  # ============================================================
  create-release:
    name: Create Release
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos, build-windows]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List all artifacts
        run: find artifacts/ -type f | head -200

      - name: Package artifacts by platform
        run: |
          cd artifacts
          for dir in */; do
            dir_name="${dir%/}"
            if [ -d "$dir_name" ]; then
              tar czf "${dir_name}.tar.gz" -C "$dir_name" .
            fi
          done
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: catboost-v${{ inputs.catboost_version }}-build-${{ github.run_number }}
          name: CatBoost v${{ inputs.catboost_version }} Build #${{ github.run_number }}
          body: |
            ## CatBoost v${{ inputs.catboost_version }} - 全平台构建产物

            ### 产物列表
            - **CLI**: `catboost` / `catboost.exe` 命令行工具
            - **catboostmodel**: C API 推理动态库 (`.so` / `.dylib` / `.dll` + `.lib`)
            - **Python wheels**: Python 3.8-3.13 各版本 wheel 包
            - **R package**: `.tgz` 格式 R 包
            - **JVM**: catboost4j-prediction / catboost4j-spark 资源
            - **Test tools**: 精度比较工具

            ### 平台
            - Linux x86_64 (with CUDA)
            - Linux aarch64 (cross-compiled)
            - macOS universal2 (x86_64 + arm64)
            - Windows x86_64 (with CUDA)

            ### 构建信息
            - CatBoost 版本: v${{ inputs.catboost_version }}
            - 构建时间: ${{ github.event.head_commit.timestamp || github.run_id }}
            - Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
